name: Release Detection

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-detection.yml"
      - "scripts/release_detection.py"
      - "targets.json"
  schedule:
    - cron: "40 * * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: write
  issues: write

concurrency:
  group: release-detection
  cancel-in-progress: false

jobs:
  detect:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Print trigger context
        run: |
          "event_name=${{ github.event_name }}"
          "schedule=${{ github.event.schedule || 'n/a' }}"
          "ref=${{ github.ref }}"
          "sha=${{ github.sha }}"
          "utc_now=$((Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          "china_now=$([System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId((Get-Date), 'China Standard Time').ToString('yyyy-MM-dd HH:mm:ss')) China Standard Time"

      - name: Detect new releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/release_detection.py
