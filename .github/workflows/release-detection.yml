name: Release Detection

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-detection.yml"
      - "scripts/release_detection.py"
      - "targets.json"
  schedule:
    - cron: "40 * * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: read
  issues: write

concurrency:
  group: release-detection
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Print trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule || 'n/a' }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "utc_now=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S %Z'

      - name: Detect new releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/release_detection.py
